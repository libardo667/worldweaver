# WorldWeaver shard: san_francisco
# Generated by scripts/new_shard.py
# Resident workspaces are currently co-located here for development. The mount is temporary hosting,
# not part of resident identity or ownership.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${WW_DB_NAME:-worldweaver_san_francisco}
      POSTGRES_USER: ${WW_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${WW_DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${WW_DB_EXTERNAL_PORT:-15433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WW_DB_USER:-postgres} -d ${WW_DB_NAME:-worldweaver_san_francisco}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../../worldweaver_engine
      dockerfile: Dockerfile
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ../../worldweaver_engine:/app
      - ./data:/app/data
      - ./residents:/app/residents
    env_file: .env
    environment:
      WW_DB_HOST: ${WW_DB_HOST:-db}
      WW_DB_PORT: ${WW_DB_PORT:-5432}
      WW_DB_NAME: ${WW_DB_NAME:-worldweaver_san_francisco}
      WW_DB_USER: ${WW_DB_USER:-postgres}
      WW_DB_PASSWORD: ${WW_DB_PASSWORD:-postgres}
      WW_DATABASE_URL: ${WW_DATABASE_URL:-}
      WW_AGENT_RESIDENTS_DIR: /app/residents
      WW_PUBLIC_URL: ${WW_RUNTIME_PUBLIC_URL:-${WW_PUBLIC_URL}}
      WW_CLIENT_URL: ${WW_CLIENT_URL:-}
      FEDERATION_URL: http://ww_world-backend:8000
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      federation:
        aliases:
          - ww_sfo-backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent:
    build:
      context: ../../ww_agent
      dockerfile: Dockerfile
    volumes:
      - ../../ww_agent:/app
      - ./residents:/app/residents
    env_file: .env
    environment:
      WW_SERVER_URL: http://backend:8000
      WW_RESIDENTS_DIR: /app/residents
      # weave-up resolves a reachable embedder (WSL→Windows Ollama gateway fallback) and
      # injects it here, overriding env_file when a swap is needed. Default: the .env value.
      WW_EMBEDDING_URL: ${WW_EMBEDDING_URL:-}
      # Incubation (arrival quarantine, experimental): when truthy, every resident is
      # sealed from the citywide current until grounded. Off by default; set for a run.
      WW_INCUBATION_ENABLED: ${WW_INCUBATION_ENABLED:-}
      # Cost the megaphone (experimental): seconds between citywide broadcasts per
      # resident; a city-targeted speak inside the cooldown lands in the room. 0/unset = off.
      WW_BROADCAST_REFRACTORY_SECONDS: ${WW_BROADCAST_REFRACTORY_SECONDS:-}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  federation:
    name: ww_dev_federation
