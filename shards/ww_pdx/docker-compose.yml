# WorldWeaver shard: portland
# Generated by scripts/new_shard.py
# Resident workspaces are currently co-located here for development. The mount is temporary hosting,
# not part of resident identity or ownership.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${WW_DB_NAME:-worldweaver_portland}
      POSTGRES_USER: ${WW_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${WW_DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${WW_DB_EXTERNAL_PORT:-15434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WW_DB_USER:-postgres} -d ${WW_DB_NAME:-worldweaver_portland}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../../worldweaver_engine
      dockerfile: Dockerfile
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ../../worldweaver_engine:/app
      - ./data:/app/data
      - ./residents:/app/residents
    env_file: .env
    environment:
      WW_DB_HOST: ${WW_DB_HOST:-db}
      WW_DB_PORT: ${WW_DB_PORT:-5432}
      WW_DB_NAME: ${WW_DB_NAME:-worldweaver_portland}
      WW_DB_USER: ${WW_DB_USER:-postgres}
      WW_DB_PASSWORD: ${WW_DB_PASSWORD:-postgres}
      WW_DATABASE_URL: ${WW_DATABASE_URL:-}
      WW_AGENT_RESIDENTS_DIR: /app/residents
      WW_PUBLIC_URL: ${WW_RUNTIME_PUBLIC_URL:-${WW_PUBLIC_URL}}
      FEDERATION_URL: http://ww_world-backend:8000
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      federation:
        aliases:
          - ww_pdx-backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent:
    build:
      context: ../../ww_agent
      dockerfile: Dockerfile
    volumes:
      - ../../ww_agent:/app
      - ./residents:/app/residents
    env_file: .env
    environment:
      WW_SERVER_URL: http://backend:8000
      WW_RESIDENTS_DIR: /app/residents
      # weave-up resolves a reachable embedder (WSL->Windows Ollama gateway fallback) and
      # injects it here — without this the agent's drive vectors fail (the SFO embedder bug).
      WW_EMBEDDING_URL: ${WW_EMBEDDING_URL:-}
      # Experimental levers (off by default; set for a run). Parity with ww_sfo so PDX can run
      # both the pre-fix old-feed cell and the incubation/costed-megaphone cure cells.
      WW_INCUBATION_ENABLED: ${WW_INCUBATION_ENABLED:-}
      WW_BROADCAST_REFRACTORY_SECONDS: ${WW_BROADCAST_REFRACTORY_SECONDS:-}
      # Widen the lark/owl chronotype spread (default 3h) so the cohort's extreme
      # rhythms wake even in the small hours — rouse a cold world without faking the clock.
      WW_CHRONOTYPE_SPREAD_HOURS: ${WW_CHRONOTYPE_SPREAD_HOURS:-}
      # Action-tendency (substrate as motor cortex): steer a keyed-up, word-bound resident
      # OUT toward the world (a venture pulse) instead of always re-deciding from a verbal prior.
      WW_ACTION_TENDENCY: ${WW_ACTION_TENDENCY:-}
      # Venture targeting mode for the homophily A/B: argmax (the most-resonant place) vs sampled
      # (draw from the resonance distribution — strays, breaks the kindred-collision).
      WW_VENTURE_TARGET_MODE: ${WW_VENTURE_TARGET_MODE:-}
      WW_VENTURE_TARGET_TEMP: ${WW_VENTURE_TARGET_TEMP:-}
      # Doula (the seed-writer): enable + pace it for a cohort-seeding run. Off/slow by default;
      # the dealt-hand cell sets WW_DOULA=1 and bumps the rate so a cold world populates promptly.
      WW_DOULA: ${WW_DOULA:-}
      WW_DOULA_MAX_SPAWNS_PER_DAY: ${WW_DOULA_MAX_SPAWNS_PER_DAY:-}
      WW_DOULA_TARGET_POPULATION: ${WW_DOULA_TARGET_POPULATION:-}
      # Cut the SEED side of the decay feedback loop: seed dealt-hand arrivals from contract +
      # bare place only (skip the world-fact enrichment that copies the room's current obsession).
      WW_DOULA_HAND_ONLY: ${WW_DOULA_HAND_ONLY:-}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  federation:
    name: ww_dev_federation
