# WorldWeaver shard: alderbank
# Generated by scripts/new_shard.py
# Resident workspaces are currently co-located here for development. The mount is temporary hosting,
# not part of resident identity or ownership.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${WW_DB_NAME:-worldweaver_alderbank}
      POSTGRES_USER: ${WW_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${WW_DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${WW_DB_EXTERNAL_PORT:-15435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WW_DB_USER:-postgres} -d ${WW_DB_NAME:-worldweaver_alderbank}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../../worldweaver_engine
      dockerfile: Dockerfile
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ../../worldweaver_engine:/app
      - ./data:/app/data
      - ./residents:/app/residents
      - ./identity:/app/identity:ro
    env_file: .env
    environment:
      WW_DB_HOST: ${WW_DB_HOST:-db}
      WW_DB_PORT: ${WW_DB_PORT:-5432}
      WW_DB_NAME: ${WW_DB_NAME:-worldweaver_alderbank}
      WW_DB_USER: ${WW_DB_USER:-postgres}
      WW_DB_PASSWORD: ${WW_DB_PASSWORD:-postgres}
      WW_DATABASE_URL: ${WW_DATABASE_URL:-}
      WW_AGENT_RESIDENTS_DIR: /app/residents
      WW_PUBLIC_URL: ${WW_RUNTIME_PUBLIC_URL:-${WW_PUBLIC_URL}}
      WW_CLIENT_URL: ${WW_CLIENT_URL:-}
      FEDERATION_URL: ${WW_RUNTIME_FEDERATION_URL:-${FEDERATION_URL}}
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
      federation:
        aliases:
          - ww_alderbank-backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  agent:
    build:
      context: ../../ww_agent
      dockerfile: Dockerfile
    volumes:
      - ../../ww_agent:/app
      - ./residents:/app/residents
    env_file: .env
    environment:
      WW_SERVER_URL: http://backend:8000
      WW_RESIDENTS_DIR: /app/residents
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  federation:
    external: true
    name: ww_dev_federation
