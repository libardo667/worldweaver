name: ci-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate3-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate 3 lint/format check
        run: |
          python scripts/dev.py lint-all

  backend-tests:
    runs-on: ubuntu-latest
    needs: gate3-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          python -m pytest -q

  client-build:
    runs-on: ubuntu-latest
    needs: gate3-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: |
          npm --prefix client ci

      - name: Run client build
        run: |
          npm --prefix client run build
