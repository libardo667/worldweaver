name: ci-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan tracked files for public leaks
        run: scripts/check-public.sh

  engine-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worldweaver_engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: worldweaver_engine/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worldweaver_engine/client/package-lock.json

      - name: Install engine dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Run engine quality gate
        run: python scripts/dev.py check

  agent-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ww_agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: ww_agent/pyproject.toml

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run agent tests
        run: python -m pytest tests -q
