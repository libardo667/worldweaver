name: ci-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan tracked files for public leaks
        run: bash scripts/check-public.sh

  workspace-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            worldweaver_engine/requirements.txt
            ww_agent/pyproject.toml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: worldweaver_engine/client/package-lock.json

      - name: Install workspace dependencies
        run: python dev.py install

      - name: Run workspace quality gate
        run: python dev.py check
