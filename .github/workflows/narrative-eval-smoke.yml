name: narrative-eval-smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run narrative eval smoke gate
        run: |
          python scripts/eval_narrative.py --smoke --enforce

      - name: Upload narrative eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: narrative-eval-smoke-artifacts
          path: reports/narrative_eval
