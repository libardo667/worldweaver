name: Setup failure
description: Report a reproducible problem installing or running the supported local demo.
title: "[setup] "
labels: ["setup"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for trying WorldWeaver. Do not include secrets, `.env` contents, resident files, prompts, or personal participant data.
  - type: input
    id: commit
    attributes:
      label: WorldWeaver commit
      description: Run `git rev-parse --short HEAD`.
      placeholder: abc1234
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - WSL 2 with Docker Desktop
        - Linux with Docker Engine
        - macOS with Docker Desktop
        - Another setup
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and result
      description: Give the command, what you expected, and the exact non-sensitive error.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Smallest reproduction
      description: Start from the documented step where the problem first appears.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, `.env` values, private resident data, prompts, and personal participant data.
          required: true
