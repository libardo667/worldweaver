services:
  client:
    build:
      context: .
      dockerfile: client-public/Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5174
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://ww_sfo-backend:8000}
      VITE_WW_WORLD_URL: ${VITE_WW_WORLD_URL:-http://ww_world-backend:8000}
      VITE_WW_SHARD_ROUTES: ${VITE_WW_SHARD_ROUTES:-}
    ports:
      - "5174:5174"
    volumes:
      - ./client-public:/app/client-public
      - public_client_node_modules:/app/client-public/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5174/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      default:
      federation:

volumes:
  public_client_node_modules:

networks:
  federation:
    name: ww_dev_federation
