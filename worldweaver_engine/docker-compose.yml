services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://ww_sfo-backend:8000}
      VITE_WW_WORLD_URL: ${VITE_WW_WORLD_URL:-http://ww_world-backend:8000}
      VITE_WW_SFO_URL: ${VITE_WW_SFO_URL:-http://ww_sfo-backend:8000}
      VITE_WW_PDX_URL: ${VITE_WW_PDX_URL:-http://ww_pdx-backend:8000}
      VITE_ENABLE_ACTION_STREAM: "0"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5173/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks:
      default:
      federation:

volumes:
  client_node_modules:

networks:
  federation:
    name: ww_dev_federation
