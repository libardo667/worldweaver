<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- the whole top is a drag handle for the frameless window -->
    <main id="portrait" data-tauri-drag-region>
      <canvas id="ember" width="440" height="440" aria-hidden="true"></canvas>

      <header class="ident" data-tauri-drag-region>
        <span id="name">Cinder</span>
        <span id="state" class="state">·</span>
      </header>

      <!-- the heart: her inner weather (and, briefly, her words flare over the ember) -->
      <p id="utterance" class="utterance"></p>
      <p id="felt" class="felt"></p>

      <!-- the persistent ledger of your exchange -->
      <div id="exchange" class="exchange"></div>

      <!-- her workshop, reached for, not shown -->
      <button id="journal-toggle" class="journal-toggle" title="what she's been making">her workshop</button>
      <div id="journal" class="journal" hidden></div>

      <form id="whisper-form" class="whisper" autocomplete="off">
        <input id="whisper-input" type="text" placeholder="whisper to her…" maxlength="400" />
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
