<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="portrait" data-tauri-drag-region>
      <!-- left rail: her workshop -->
      <aside id="rail-left" class="rail">
        <div class="rail-head">her workshop</div>
        <div id="journal" class="rail-body"></div>
      </aside>

      <!-- center: the ember, her inner weather, the exchange -->
      <section id="center" data-tauri-drag-region>
        <canvas id="ember" width="440" height="440" aria-hidden="true"></canvas>

        <header class="ident" data-tauri-drag-region>
          <span id="name">Cinder</span>
          <span id="state" class="state">·</span>
        </header>

        <p id="utterance" class="utterance"></p>
        <p id="felt" class="felt"></p>

        <div id="exchange" class="exchange"></div>

        <form id="whisper-form" class="whisper" autocomplete="off">
          <input id="whisper-input" type="text" placeholder="whisper to her…" maxlength="400" />
        </form>
      </section>

      <!-- right rail: what she remembers -->
      <aside id="rail-right" class="rail">
        <div class="rail-head">what she remembers</div>
        <ul id="memory" class="rail-body"></ul>
      </aside>

      <div id="resize-grip" title="drag to resize"></div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
