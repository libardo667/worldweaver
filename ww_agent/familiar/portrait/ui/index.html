<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>the stable</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="portrait" data-tauri-drag-region>
      <!-- the stable: switch between familiars -->
      <nav id="roster" data-tauri-drag-region>
        <div id="fams"></div>
        <div id="controls">
          <button id="files-btn" title="what this familiar can read">⊞ files</button>
          <button id="theme-btn" title="cycle theme">◐</button>
          <div id="scale-ctl">
            <button id="scale-down" title="smaller">A−</button>
            <span id="scale-val">100%</span>
            <button id="scale-up" title="bigger">A+</button>
          </div>
        </div>
      </nav>

      <div id="stage">
      <!-- left rail: the workshop -->
      <aside id="rail-left" class="rail">
        <div class="rail-head">the workshop</div>
        <div id="journal" class="rail-body"></div>
      </aside>
      <div class="rail-grip" id="grip-left" title="drag to resize"></div>

      <!-- center: the ember, the inner weather, the exchange -->
      <section id="center" data-tauri-drag-region>
        <div id="crown" class="felt-collapsed">
          <div id="crownbar" data-tauri-drag-region>
            <canvas id="ember" width="320" height="320" aria-hidden="true"></canvas>
            <header class="ident">
              <span id="name"></span>
              <span id="state" class="state">·</span>
            </header>
            <button id="felt-toggle" type="button" title="inner weather" aria-expanded="false">⌄</button>
          </div>
          <p id="felt" class="felt"></p>
        </div>

        <div id="exchange" class="exchange"></div>

        <form id="whisper-form" class="whisper" autocomplete="off">
          <div class="whisper-row">
            <textarea id="whisper-input" placeholder="whisper…" maxlength="400" rows="1"></textarea>
            <button id="whisper-send" type="submit" title="send" aria-label="send">↑</button>
          </div>
          <div id="whisper-note">A familiar answers in its own time, in its own way — sometimes in words, sometimes not.</div>
        </form>
      </section>

      <div class="rail-grip" id="grip-right" title="drag to resize"></div>
      <!-- right rail: what is kept -->
      <aside id="rail-right" class="rail">
        <div class="rail-head">what is kept</div>
        <ul id="memory" class="rail-body"></ul>
      </aside>
      </div>

      <!-- phone only: one panel at a time — the face by default, workshop & kept a tap away -->
      <nav id="mobile-nav" aria-label="views">
        <button class="mtab active" data-view="face" type="button">the familiar</button>
        <button class="mtab" data-view="workshop" type="button">workshop</button>
        <button class="mtab" data-view="kept" type="button">kept</button>
      </nav>

      <div id="resize-grip" title="drag to resize"></div>
    </main>

    <!-- FileScope viewer: what the selected familiar may read -->
    <div id="filescope" class="overlay hidden">
      <div class="panel">
        <div class="panel-head">
          <span>what <b id="fs-name">—</b> can read</span>
          <button id="fs-close" title="close">×</button>
        </div>
        <div id="fs-body" class="panel-body"></div>
      </div>
    </div>

    <!-- full text of a workshop artifact (e.g. the whole journal, not just the last page) -->
    <div id="artifact" class="overlay hidden">
      <div class="panel">
        <div class="panel-head">
          <span><b id="artifact-name">—</b></span>
          <button id="artifact-close" title="close">×</button>
        </div>
        <div id="artifact-body" class="panel-body"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
